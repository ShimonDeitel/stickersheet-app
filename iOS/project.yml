name: StickerSheet
options:
  bundleIdPrefix: com.shimondeitel.stickersheet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  StickerSheet:
    type: application
    platform: iOS
    sources:
      - path: StickerSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stickersheet
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: StickerSheet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StickerSheetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StickerSheetTests
      - path: StickerSheet.storekit
    dependencies:
      - target: StickerSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stickersheet.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StickerSheetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StickerSheetUITests
    dependencies:
      - target: StickerSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stickersheet.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  StickerSheet:
    build:
      targets:
        StickerSheet: all
        StickerSheetTests: [test]
        StickerSheetUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: StickerSheet.storekit
    test:
      config: Debug
      storeKitConfiguration: StickerSheet.storekit
      targets:
        - StickerSheetTests
        - StickerSheetUITests
    archive:
      config: Release
